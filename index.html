<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VisaWatch">
<meta name="theme-color" content="#080b14">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%238b6fff'/%3E%3Ctext x='50' y='67' font-size='50' text-anchor='middle' fill='white'%3E🛂%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#080b14;--glass:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.10);
  --text-1:#f0f0f8;--text-2:#a0a0c0;--text-3:#606080;
  --accent:#8b6fff;--green:#00e680;--red:#ff4455;--amber:#ffb840;
  --r:14px;--r-lg:20px;--blur:blur(24px);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text-1);display:flex;flex-direction:column;min-height:100vh;}
.orb{position:fixed;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:0;opacity:0.22;}
.orb-1{width:350px;height:350px;background:#2d1a8a;top:-120px;left:-80px;animation:d1 14s ease-in-out infinite;}
.orb-2{width:280px;height:280px;background:#0a2050;bottom:-80px;right:-60px;animation:d2 17s ease-in-out infinite;}
@keyframes d1{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,15px)}}
@keyframes d2{0%,100%{transform:translate(0,0)}50%{transform:translate(-15px,-20px)}}
.header{background:rgba(5,7,16,0.7);backdrop-filter:var(--blur);border-bottom:0.5px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.header-title{font-size:16px;font-weight:800;letter-spacing:-0.5px;}
.accent{background:linear-gradient(135deg,#b89fff,#8b6fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.content{padding:13px;display:flex;flex-direction:column;gap:11px;flex:1;overflow-y:auto;}
.screen{display:none;flex-direction:column;gap:11px;}
.screen.active{display:flex;}
.card{background:rgba(255,255,255,0.05);backdrop-filter:var(--blur);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:15px;}
.card.red{background:rgba(255,68,85,0.12);border-color:rgba(255,68,85,0.5);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{border-color:rgba(255,68,85,0.4)}50%{border-color:rgba(255,68,85,0.95)}}
.lbl{font-size:10px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.key-input{width:100%;background:rgba(0,0,0,0.35);border:0.5px solid var(--border);border-radius:var(--r);padding:13px;color:var(--text-1);font-size:18px;font-weight:700;text-align:center;text-transform:uppercase;font-family:'Space Mono',monospace;margin-bottom:12px;}
.key-input:focus{border-color:var(--accent);outline:none;}
.btn{width:100%;padding:14px;border:none;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer;transition:opacity 0.2s;}
.btn:active{opacity:0.8;}
.btn-activate{background:linear-gradient(135deg,#8b6fff,#6b4fdf);color:#fff;}
.btn-notif{background:rgba(0,230,128,0.12);border:0.5px solid rgba(0,230,128,0.3);color:var(--green);}
.btn-test{background:rgba(255,184,64,0.12);border:0.5px solid rgba(255,184,64,0.3);color:var(--amber);}
.btn-book{background:rgba(0,230,128,0.12);border:0.5px solid rgba(0,230,128,0.3);color:var(--green);display:none;}
.btn-book.show{display:flex;}
.btn-logout{background:rgba(255,68,85,0.12);border:0.5px solid rgba(255,68,85,0.3);color:var(--red);margin-top:8px;}
.alert-banner{background:rgba(255,68,85,0.10);border:0.5px solid rgba(255,68,85,0.5);border-radius:var(--r);padding:12px;display:none;align-items:center;gap:10px;color:var(--red);cursor:pointer;animation:pulse 1.5s infinite;}
.alert-banner.show{display:flex;}
.notif-card{background:rgba(139,111,255,0.08);border:0.5px solid rgba(139,111,255,0.2);border-radius:var(--r-lg);padding:13px;display:flex;gap:10px;flex-direction:column;}
.notif-card.hidden{display:none;}
.notif-status{margin-top:8px;padding:8px;border-radius:8px;font-size:11px;text-align:center;}
.notif-status.granted{background:rgba(0,230,128,0.1);color:var(--green);}
.notif-status.denied{background:rgba(255,68,85,0.1);color:var(--red);}
.notif-status.default{background:rgba(255,184,64,0.1);color:var(--amber);}
.err-box{background:rgba(255,68,85,0.12);border:0.5px solid rgba(255,68,85,0.3);border-radius:var(--r);padding:10px;color:var(--red);font-size:12px;display:none;}
.err-box.show{display:block;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(8,11,20,0.95);border:0.5px solid var(--accent);border-radius:50px;padding:8px 18px;font-size:12px;z-index:200;opacity:0;transition:0.2s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.btn-row{display:flex;gap:8px;}
.btn-row .btn{flex:1;margin:0;}
</style>
</head>
<body>
<div class="orb orb-1"></div><div class="orb orb-2"></div>
<div class="header">
  <div class="header-title">Visa<span class="accent">Watch</span></div>
  <div>📱</div>
</div>

<div class="content">
  <!-- LICENSE SCREEN -->
  <div class="screen active" id="screenLicense">
    <div class="card" style="text-align:center">
      <div style="font-size:42px;margin-bottom:12px">🛂</div>
      <div class="header-title" style="margin-bottom:4px">Visa<span class="accent">Watch</span></div>
      <div style="font-size:12px;color:var(--text-3);margin-bottom:24px">Entrez votre clé de licence</div>
      <input class="key-input" id="keyInput" type="text" placeholder="VW-XXXX-XXXX" maxlength="20" autocomplete="off" oninput="this.value=this.value.toUpperCase()">
      <button class="btn btn-activate" id="btnActivate" onclick="activateLicense()">Activer</button>
      <div class="err-box" id="errBox"></div>
    </div>
  </div>

  <!-- MAIN SCREEN -->
  <div class="screen" id="screenMain">
    <div class="alert-banner" id="alertBanner" onclick="openBLS()">
      <span>🔴</span><span>CRÉNEAU DÉTECTÉ — Réservez !</span>
    </div>
    
    <div class="notif-card" id="notifCard">
      <div style="display:flex;gap:10px;align-items:center">
        <div>🔔</div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600">Alertes vocales & vibrations</div>
          <div style="font-size:11px;color:var(--text-3)">Son + vibration même écran verrouillé</div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-notif" onclick="enableAudioAlerts()" style="margin:0">🔊 Activer son</button>
        <button class="btn btn-test" onclick="testAudioAlert()" style="margin:0">🔔 Tester</button>
      </div>
      <div class="notif-status" id="notifStatus">⚠️ Activez le son pour être alerté</div>
    </div>

    <div class="card">
      <div class="lbl">Licence</div>
      <div id="licDisplay" style="font-family:'Space Mono';color:var(--accent);font-weight:700">------</div>
    </div>
    
    <div class="card" id="statusCard">
      <div style="text-align:center">
        <div id="statusEmoji" style="font-size:32px">⏳</div>
        <div id="statusTitle" style="font-weight:700;margin-top:4px">En attente</div>
        <div id="statusSub" style="font-size:11px;color:var(--text-3);margin-top:4px">Activez les alertes sonores</div>
      </div>
    </div>
    
    <button class="btn btn-book" id="btnBook" onclick="openBLS()">🚨 Réserver maintenant</button>
    
    <div class="card">
      <div class="lbl">Historique des alertes</div>
      <div id="historyList"><div style="color:var(--text-3);font-size:12px;text-align:center;padding:12px">Aucune alerte</div></div>
    </div>
    
    <button class="btn btn-logout" onclick="logout()">Déconnexion</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<audio id="alertSound" preload="auto">
  <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" type="audio/mpeg">
</audio>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const SUPABASE_URL = 'https://erjyfyzmhxsqkuxwtwbc.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVyanlmeXptaHhzcWt1eHd0d2JjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1Mzc4MTgsImV4cCI6MjA5NTExMzgxOH0.v0VZ77UP6DvLz0cswyCMpisynYyqn41zeA20_x9dACE'

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

let licenseKey = localStorage.getItem('vw_key') || ''
let alerts = JSON.parse(localStorage.getItem('vw_alerts') || '[]')
let currentChannel = null
let audioEnabled = localStorage.getItem('vw_audio') === '1'
let audioElement = null

function getPhoneId() {
  let id = localStorage.getItem('vw_phone_id')
  if (!id) { 
    id = 'ph_' + Math.random().toString(36).substring(2) + Date.now().toString(36)
    localStorage.setItem('vw_phone_id', id)
  }
  return id
}

function initAudio() {
  audioElement = document.getElementById('alertSound')
  if (!audioElement) {
    audioElement = new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3')
  }
  audioElement.load()
}

function updateAudioStatusUI() {
  const statusEl = document.getElementById('notifStatus')
  const notifCard = document.getElementById('notifCard')
  
  if (audioEnabled) {
    statusEl.textContent = '🔊 Alertes sonores ACTIVÉES'
    statusEl.className = 'notif-status granted'
    notifCard.classList.add('hidden')
    document.getElementById('statusSub').innerHTML = 'Alertes sonores actives — vous entendrez une sonnerie'
  } else {
    statusEl.textContent = '⚠️ Activez les alertes sonores pour être averti immédiatement'
    statusEl.className = 'notif-status default'
  }
}

function enableAudioAlerts() {
  audioEnabled = true
  localStorage.setItem('vw_audio', '1')
  updateAudioStatusUI()
  showToast('Alertes sonores activées ✓')
  
  // Play a test sound
  playAlertSound()
}

function playAlertSound() {
  if (!audioEnabled) return
  
  try {
    if (audioElement) {
      audioElement.currentTime = 0
      audioElement.play().catch(e => console.log('Audio play failed:', e))
    }
  } catch(e) {
    console.log('Audio error:', e)
  }
  
  // Vibrate
  if (navigator.vibrate) {
    navigator.vibrate([300, 100, 300, 100, 600])
  }
}

function testAudioAlert() {
  showToast('🔔 Test d\'alerte...')
  playAlertSound()
  
  // Also show visual feedback
  const originalClass = document.getElementById('statusCard').className
  document.getElementById('statusCard').classList.add('red')
  document.getElementById('statusEmoji').innerHTML = '🔔'
  document.getElementById('statusTitle').innerHTML = 'TEST'
  document.getElementById('statusSub').innerHTML = 'Alerte de test réussie !'
  
  setTimeout(() => {
    document.getElementById('statusCard').className = originalClass
    document.getElementById('statusEmoji').innerHTML = '⏳'
    document.getElementById('statusTitle').innerHTML = 'En attente'
    document.getElementById('statusSub').innerHTML = audioEnabled ? 'Alertes sonores actives' : 'Activez les alertes sonores'
  }, 2000)
}

async function activateLicense() {
  const key = document.getElementById('keyInput').value.trim().toUpperCase()
  if (!key || key.length < 6) { showErr('Entrez une clé valide (ex: VW-XXXX-XXXX)'); return }
  
  const btn = document.getElementById('btnActivate')
  btn.disabled = true
  btn.textContent = 'Vérification...'
  document.getElementById('errBox').classList.remove('show')
  
  try {
    const { data, error } = await supabase
      .from('licenses')
      .select('*')
      .eq('key', key)
      .maybeSingle()
    
    if (error || !data) throw new Error('Clé invalide')
    if (data.status !== 'active') throw new Error('Cette clé a été révoquée')
    
    const phoneId = getPhoneId()
    if (data.phone_device_id && data.phone_device_id !== phoneId) {
      throw new Error('Cette clé est déjà utilisée sur un autre téléphone')
    }
    
    await supabase
      .from('licenses')
      .update({ 
        phone_device_id: phoneId, 
        phone_activated_at: new Date().toISOString() 
      })
      .eq('key', key)
    
    licenseKey = key
    localStorage.setItem('vw_key', key)
    initAudio()
    showMain()
    showToast('Licence activée ✓')
    
  } catch(e) {
    showErr(e.message)
    btn.disabled = false
    btn.textContent = 'Activer'
  }
}

async function showMain() {
  document.getElementById('screenLicense').classList.remove('active')
  document.getElementById('screenMain').classList.add('active')
  document.getElementById('licDisplay').textContent = licenseKey
  renderHistory()
  updateAudioStatusUI()
  
  if (currentChannel) {
    await supabase.removeChannel(currentChannel)
  }
  
  currentChannel = supabase
    .channel(`alerts-${licenseKey}`)
    .on('postgres_changes', 
      { event: 'INSERT', schema: 'public', table: 'alerts', filter: `license_key=eq.${licenseKey}` },
      (payload) => {
        console.log('Alert received:', payload.new)
        handleAlert(payload.new)
      }
    )
    .subscribe()
  
  await loadExistingAlerts()
}

async function loadExistingAlerts() {
  const { data, error } = await supabase
    .from('alerts')
    .select('*')
    .eq('license_key', licenseKey)
    .order('created_at', { ascending: false })
    .limit(20)
  
  if (error) return
  
  if (data && data.length) {
    for (const alert of data) {
      if (!alerts.find(a => a.id === alert.id)) {
        alerts.unshift({ 
          message: alert.message, 
          time: new Date(alert.created_at).toLocaleString('fr-DZ'), 
          id: alert.id 
        })
      }
    }
    if (alerts.length > 20) alerts = alerts.slice(0, 20)
    localStorage.setItem('vw_alerts', JSON.stringify(alerts))
    renderHistory()
    
    // Play sound for recent alert
    const lastAlertId = localStorage.getItem('last_alert_id_' + licenseKey)
    if (data[0] && lastAlertId !== data[0].id) {
      localStorage.setItem('last_alert_id_' + licenseKey, data[0].id)
      handleAlert(data[0])
    }
  }
}

function handleAlert(alert) {
  console.log('Handling alert:', alert)
  
  // Play sound and vibrate immediately
  playAlertSound()
  
  // Update UI
  document.getElementById('statusCard').classList.add('red')
  document.getElementById('statusEmoji').innerHTML = '🚨'
  document.getElementById('statusTitle').innerHTML = 'CRÉNEAU DISPONIBLE !'
  document.getElementById('statusSub').innerHTML = alert.message || 'Réservez immédiatement sur BLS'
  document.getElementById('alertBanner').classList.add('show')
  document.getElementById('btnBook').classList.add('show')
  
  // Add to history
  const alertId = alert.id || Date.now().toString()
  if (!alerts.find(a => a.id === alertId)) {
    alerts.unshift({ 
      message: alert.message, 
      time: new Date().toLocaleString('fr-DZ'), 
      id: alertId 
    })
    if (alerts.length > 20) alerts.pop()
    localStorage.setItem('vw_alerts', JSON.stringify(alerts))
    renderHistory()
  }
  
  // Try browser notification as bonus (if allowed)
  if (Notification.permission === 'granted') {
    new Notification('🚨 Créneau BLS Espagne !', {
      body: alert.message || 'Un créneau vient de s\'ouvrir !',
      icon: '/icon-192.png',
      vibrate: [300, 100, 300]
    })
  }
}

function renderHistory() {
  const el = document.getElementById('historyList')
  if (!alerts.length) {
    el.innerHTML = '<div style="color:var(--text-3);font-size:12px;text-align:center;padding:12px">Aucune alerte</div>'
    return
  }
  el.innerHTML = alerts.map(a => `
    <div style="padding:10px 0;border-bottom:0.5px solid rgba(255,255,255,0.05)">
      <div style="font-size:12px">${a.message || 'Créneau détecté'}</div>
      <div style="font-size:10px;color:var(--text-3);margin-top:4px">${a.time}</div>
    </div>
  `).join('')
}

function openBLS() {
  window.open('https://algeria.blsspainglobal.com/DZA/account/login', '_blank')
}

function logout() {
  licenseKey = ''
  localStorage.removeItem('vw_key')
  if (currentChannel) {
    supabase.removeChannel(currentChannel)
  }
  document.getElementById('screenMain').classList.remove('active')
  document.getElementById('screenLicense').classList.add('active')
  document.getElementById('keyInput').value = ''
  document.getElementById('statusCard').classList.remove('red')
  document.getElementById('statusEmoji').innerHTML = '⏳'
  document.getElementById('statusTitle').innerHTML = 'En attente'
  document.getElementById('statusSub').innerHTML = 'Activez les alertes sonores'
  document.getElementById('alertBanner').classList.remove('show')
  document.getElementById('btnBook').classList.remove('show')
}

function showErr(msg) {
  const el = document.getElementById('errBox')
  el.textContent = msg
  el.classList.add('show')
  setTimeout(() => el.classList.remove('show'), 4000)
}

function showToast(msg) {
  const t = document.getElementById('toast')
  t.textContent = msg
  t.classList.add('show')
  setTimeout(() => t.classList.remove('show'), 2500)
}

// Initialize
if (licenseKey) {
  initAudio()
  showMain()
}

// Try to request notification permission as bonus
document.addEventListener('DOMContentLoaded', () => {
  if ('Notification' in window && Notification.permission === 'default') {
    setTimeout(() => {
      Notification.requestPermission()
    }, 1000)
  }
})

// Expose functions globally
window.activateLicense = activateLicense
window.enableAudioAlerts = enableAudioAlerts
window.testAudioAlert = testAudioAlert
window.openBLS = openBLS
window.logout = logout
</script>
</body>
</html>
